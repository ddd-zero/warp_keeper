name: release-linux-unix

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的标签（例如 v1.0.0）"
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: warp-keeper
  TARGET: x86_64-unknown-linux-musl
  ARTIFACT_BASELINE: warp-keeper-linux-x86_64-musl
  ARTIFACT_AVX2: warp-keeper-linux-x86_64-musl-avx2
  RUSTFLAGS_BASELINE: -C target-cpu=x86-64 -C target-feature=-avx,-avx2
  RUSTFLAGS_AVX2: -C target-cpu=x86-64-v3 -C target-feature=+avx,+avx2,+fma

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: 安装 musl 工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: 编译并准备发布二进制
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          # 普通版（不启用 AVX/AVX2）
          RUSTFLAGS="${RUSTFLAGS_BASELINE}" cargo build --release --target "${TARGET}"
          install -m 0755 "target/${TARGET}/release/${BIN_NAME}" "dist/${ARTIFACT_BASELINE}"

          # AVX2 版
          RUSTFLAGS="${RUSTFLAGS_AVX2}" cargo build --release --target "${TARGET}"
          install -m 0755 "target/${TARGET}/release/${BIN_NAME}" "dist/${ARTIFACT_AVX2}"

          (
            cd dist
            sha256sum "${ARTIFACT_BASELINE}" > "${ARTIFACT_BASELINE}.sha256"
            sha256sum "${ARTIFACT_AVX2}" > "${ARTIFACT_AVX2}.sha256"
          )

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: |
            dist/${{ env.ARTIFACT_BASELINE }}
            dist/${{ env.ARTIFACT_BASELINE }}.sha256
            dist/${{ env.ARTIFACT_AVX2 }}
            dist/${{ env.ARTIFACT_AVX2 }}.sha256

  release:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      # --- 新增：必须把代码拉下来，gh release 才能读取 git 信息 ---
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      # -------------------------------------------------------------

      - name: 解析发布标签
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 汇总待发布文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find dist -type f \
            \( -name "${ARTIFACT_BASELINE}" -o -name "${ARTIFACT_BASELINE}.sha256" -o -name "${ARTIFACT_AVX2}" -o -name "${ARTIFACT_AVX2}.sha256" \) \
            -exec cp {} upload/ \;
          ls -lah upload

      - name: 创建或更新 Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" upload/* --clobber
          else
            gh release create "${RELEASE_TAG}" upload/* --title "${RELEASE_TAG}" --generate-notes --target "${GITHUB_SHA}"
          fi
